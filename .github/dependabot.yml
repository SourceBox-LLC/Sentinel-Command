# Dependabot configuration.
#
# NOTE: `dependabot.yml` has NO `auto-merge` field — it is not a valid
# config key and was silently ignored (so auto-merge never actually
# ran). Auto-merge is handled by .github/workflows/dependabot-auto-merge.yml,
# which merges PATCH and MINOR bumps automatically once the "Test &
# Deploy" PR checks pass, and leaves MAJOR bumps for manual review.
version: 2
updates:
  # Backend — Python (uv)
  - package-ecosystem: "uv"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "build(deps)"
    labels:
      - "dependencies"
      - "backend"

  # Frontend — npm
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "build(deps-dev)"
    labels:
      - "dependencies"
      - "frontend"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
